function Login(){

        <div style={{width:72,height:72,borderRadius:20,background:`linear-gradient(135deg,${C.redD},${C.red})`,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:32,boxShadow:'0 8px 32px rgba(229,57,53,.4)'}}>🏋️</div>

        <div style={{marginBottom:20,position:'relative'}}><label style={lbl}>SENHA</label><input style={{...inp,paddingRight:46}} type={show?'text':'password'} placeholder="••••••" value={pw} onChange={e=>{setPw(e.target.value);setErr('');}} onKeyDown={e=>e.key==='Enter'&&go()}/><button onClick={()=>setShow(!show)} style={{position:'absolute',right:12,top:26,background:'none',border:'none',cursor:'pointer',color:C.g2,fontSize:20,padding:4}}>{show?'🙈':'👁️'}</button></div>
        {err&&<div style={{background:C.redA,border:`1px solid ${C.redB}`,borderRadius:8,padding:'10px 14px',fontSize:13,color:'#ff6b6b',marginBottom:16}}>{err}</div>}
        <button onClick={go} disabled={ld} style={{...bR({width:'100%',padding:'14px',letterSpacing:1.5,fontSize:15,opacity:ld?.7:1})}}>{ld?'ENTRANDO...':'ENTRAR'}</button>
        <div style={{textAlign:'center',marginTop:14}}><span style={{fontSize:13,color:C.red,cursor:'pointer'}}>Esqueceu a senha?</span></div>

function SWorkouts(){
  const {workouts,isDone}=useG();const [day,setDay]=useState(TODAY||'Segunda');const [vex,setVex]=useState(null);const [celebrated,setCelebrated]=useState({});
  const w=workouts[day];const done=w?w.exercises.filter(e=>isDone(day,e.id)).length:0;const pct=w?Math.round(done/w.exercises.length*100):0;
  const allDone=w&&done===w.exercises.length&&w.exercises.length>0;
  const MSGS=['Incrível! Você arrasou no treino de hoje! 💪','Consistência é a chave. Continue assim! 🔥','Mais um treino concluído! Você está evoluindo! 🏆','Seu esforço de hoje é o resultado de amanhã! ⚡'];

    {vex&&<VModal ex={vex} onClose={()=>setVex(null)}/>}

        <div style={{...hf,fontSize:28,color:C.grn,marginBottom:10}}>TREINO CONCLUÍDO!</div>
        <div style={{fontSize:15,color:C.g1,marginBottom:6}}>{MSGS[Math.floor(Math.random()*MSGS.length)]}</div>
        <div style={{fontSize:12,color:C.g2,marginBottom:24}}>Você completou todos os {w.exercises.length} exercícios de {day}!</div>
        <div style={{background:'rgba(76,175,80,.1)',border:'1px solid rgba(76,175,80,.3)',borderRadius:10,padding:'12px 16px',marginBottom:20,fontSize:13,color:C.grn}}>⚠️ Lembre-se de guardar os pesos e equipamentos nos lugares corretos!</div>
        <button onClick={()=>setCelebrated(p=>({...p,[day]:false}))} style={{...bR({padding:'12px 28px',background:C.grn})}}>Fechar</button>

    </div>
    {w&&(<>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div><div style={{...hf,fontSize:20}}>{w.focus.toUpperCase()}</div><div style={{fontSize:12,color:C.g2}}>{w.exercises.length} exercícios</div></div>

      </div>

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><div style={{...hf,fontSize:28,letterSpacing:2}}>USUÁRIOS</div><button onClick={openAdd} style={{...bR({padding:'10px 20px',fontSize:13})}}>+ Novo Usuário</button></div>
    <div style={{display:'flex',gap:10,marginBottom:16}}><input style={{...inp,flex:1,fontSize:14}} placeholder="Buscar usuário..." value={search} onChange={e=>setSearch(e.target.value)}/><select style={{...inp,width:120,fontSize:14}} value={filt} onChange={e=>setFilt(e.target.value)}><option value="all">Todos</option><option value="aluno">Alunos</option><option value="personal">Personais</option><option value="admin">Admins</option></select></div>
    <div style={{...mkCard({padding:0,overflow:'hidden'})}}>
      <div style={{padding:'12px 20px',background:'#141414',borderBottom:`1px solid ${C.bd}`,display:'grid',gridTemplateColumns:'minmax(140px,2fr) minmax(140px,2fr) 90px 130px',gap:10,fontSize:11,color:C.g2,letterSpacing:.5}}><span>NOME</span><span>EMAIL</span><span>TIPO</span><span>AÇÕES</span></div>
      {shown.map(u=>(<div key={u.id} style={{padding:'13px 20px',borderBottom:`1px solid ${C.bd}`,display:'grid',gridTemplateColumns:'minmax(140px,2fr) minmax(140px,2fr) 90px 130px',gap:10,alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,overflow:'hidden'}}><Av name={u.name} size={32} bg={TC[u.type]}/><div style={{overflow:'hidden'}}><div style={{fontSize:13,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.name}</div>{u.objetivo&&<div style={{fontSize:11,color:C.g2}}>{u.objetivo}</div>}</div></div>
        <div style={{fontSize:13,color:C.g1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{u.email}</div>
        <Chip label={TL[u.type]} color={TC[u.type]}/>
        <div style={{display:'flex',gap:6}}><button onClick={()=>openEdit(u)} style={{background:'#1a1a1a',border:`1px solid ${C.bd}`,borderRadius:6,padding:'6px 10px',cursor:'pointer',color:C.g1,fontSize:12}}>Editar</button><button onClick={()=>deleteUser(u.id)} style={{background:C.redA,border:`1px solid ${C.redB}`,borderRadius:6,padding:'6px 10px',cursor:'pointer',color:C.red,fontSize:12}}>Excluir</button></div>
      </div>))}
      {shown.length===0&&<div style={{padding:40,textAlign:'center',color:C.g2}}>Nenhum usuário encontrado</div>}
    </div>
  </div>);
}
function ANotifs(){
  const {users,notifs,sendNotif,deleteNotif}=useG();const [msg,setMsg]=useState('');const [to,setTo]=useState('all');const [ok,setOk]=useState(false);
  const alunos=users.filter(u=>u.type==='aluno');const personais=users.filter(u=>u.type==='personal');
  const send=()=>{if(!msg.trim())return;const uid=to==='all'||to==='alunos'||to==='personais'?to:parseInt(to);sendNotif(msg.trim(),uid);setMsg('');setOk(true);setTimeout(()=>setOk(false),3000);};
  return(<div>
    <div style={{...hf,fontSize:28,letterSpacing:2,marginBottom:22}}>NOTIFICAÇÕES</div>
    <div style={{...mkCard({padding:24,marginBottom:22})}}>
      <div style={{fontWeight:600,marginBottom:16}}>Enviar Notificação</div>
      <div style={{marginBottom:14}}><label style={lbl}>DESTINATÁRIO</label><select style={{...inp,fontSize:14}} value={to} onChange={e=>setTo(e.target.value)}>
        <option value="all">Todos (alunos + personais)</option>
        <option value="alunos">Todos os Alunos</option>
        <option value="personais">Todos os Personais</option>
        <optgroup label="Alunos">{alunos.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</optgroup>
        <optgroup label="Personais">{personais.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</optgroup>
      </select></div>
      <div style={{marginBottom:14}}><label style={lbl}>MENSAGEM</label><textarea style={{...inp,resize:'vertical',minHeight:80,fontSize:14}} value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Digite a mensagem..."/></div>
      {ok&&<div style={{background:'rgba(76,175,80,.1)',border:'1px solid rgba(76,175,80,.3)',borderRadius:8,padding:'10px 14px',fontSize:13,color:C.grn,marginBottom:14}}>Enviada com sucesso!</div>}
      <button onClick={send} style={{...bR({padding:'12px 24px'})}}>Enviar Notificação</button>
    </div>
    <div style={{...mkCard({padding:0,overflow:'hidden'})}}>
      <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.bd}`,fontWeight:600}}>Histórico ({notifs.length})</div>
      {notifs.length===0&&<div style={{padding:40,textAlign:'center',color:C.g2}}>Nenhuma notificação</div>}
      {notifs.map(n=>(<div key={n.id} style={{padding:'14px 20px',borderBottom:`1px solid ${C.bd}`,display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:8,height:8,borderRadius:'50%',background:n.read?C.g3:C.red,flexShrink:0}}/>
        <div style={{flex:1}}><div style={{fontSize:14,color:n.read?C.g1:C.w}}>{n.msg}</div><div style={{fontSize:11,color:C.g2,marginTop:3}}>{n.date} · {n.target==='all'?'Todos':n.target==='alunos'?'Todos os Alunos':n.target==='personais'?'Todos os Personais':users.find(u=>u.id===n.target)?.name||'Usuário'}</div></div>
        <button onClick={()=>deleteNotif(n.id)} style={{background:'none',border:'none',cursor:'pointer',color:C.g2,fontSize:18,padding:4}}>✕</button>
      </div>))}
    </div>
  </div>);
}
function ASchedule(){
  const [s,setS]=useState([...SCHED]);const [edit,setEdit]=useState(false);
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}><div style={{...hf,fontSize:28,letterSpacing:2}}>HORÁRIOS</div><button onClick={()=>setEdit(!edit)} style={{...(edit?bR({padding:'10px 20px',fontSize:13}):bO({padding:'10px 20px',fontSize:13}))}}>{edit?'Salvar':'Editar'}</button></div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:20}}>
      {s.map(([d,h],i)=>(<div key={d} style={{...mkCard({padding:20})}}>
        <div style={{fontSize:11,color:C.g2,marginBottom:10,letterSpacing:.5}}>{d.toUpperCase()}</div>
        {edit?<input style={{...inp,fontSize:15,fontWeight:600}} value={h} onChange={e=>setS(p=>{const n=[...p];n[i]=[d,e.target.value];return n;})}/>:<div style={{...hf,fontSize:24,color:h==='Fechado'?C.red:C.w}}>{h}</div>}
      </div>))}
    </div>
    <div style={{...mkCard({padding:20})}}>
      <div style={{fontWeight:600,marginBottom:14}}>Status Atual</div>
      <div style={{display:'flex',alignItems:'center',gap:14}}><div style={{width:14,height:14,borderRadius:'50%',background:gymOpen()?C.grn:C.red,flexShrink:0}}/><div><div style={{fontWeight:600,fontSize:16}}>{gymOpen()?'Academia Aberta':'Academia Fechada'}</div><div style={{fontSize:13,color:C.g2}}>{new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div></div></div>
    </div>
  </div>);
}
function AdminApp(){
  const {user,logout}=useG();const [view,setView]=useState('dashboard');
  const navs=[['dashboard','📊','Dashboard'],['users','👥','Usuários'],['notifications','🔔','Notificações'],['schedule','🕐','Horários']];
  return(<div style={{display:'flex',minHeight:'100vh',background:C.bg}}>
    <div style={{width:210,background:'#0c0c0c',borderRight:`1px solid ${C.bd}`,display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100vh',overflowY:'auto',flexShrink:0}}>
      <div style={{padding:'22px 18px',borderBottom:`1px solid ${C.bd}`}}><div style={{...hf,fontSize:22,color:C.red,letterSpacing:3}}>IRON</div><div style={{...hf,fontSize:22,letterSpacing:3}}>FITNESS</div><div style={{fontSize:11,color:C.g2,marginTop:4,letterSpacing:.5}}>PAINEL ADMIN</div></div>
      <nav style={{padding:'14px 10px',flex:1}}>
        {navs.map(([v,icon,l])=>(<button key={v} onClick={()=>setView(v)} style={{width:'100%',display:'flex',alignItems:'center',gap:10,padding:'11px 10px',borderRadius:8,border:'none',cursor:'pointer',marginBottom:4,textAlign:'left',background:view===v?C.redA:'transparent',color:view===v?C.red:C.g1,fontSize:13,fontWeight:view===v?600:400,transition:'all .2s'}}><span style={{fontSize:18}}>{icon}</span>{l}</button>))}
      </nav>
      <div style={{padding:'14px 10px',borderTop:`1px solid ${C.bd}`}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><Av name={user.name} size={32}/><div><div style={{fontSize:12,fontWeight:600}}>{user.name.split(' ')[0]}</div><div style={{fontSize:10,color:C.g2}}>Admin</div></div></div>
        <button onClick={logout} style={{...bO({width:'100%',padding:'8px',fontSize:12})}}>Sair</button>
      </div>
    </div>
    <div style={{flex:1,padding:'28px 30px',overflowX:'auto',minWidth:0}}>
      {view==='dashboard'&&<ADashboard/>}{view==='users'&&<AUsers/>}{view==='notifications'&&<ANotifs/>}{view==='schedule'&&<ASchedule/>}
    </div>
  </div>);
}
function App(){
  const [user,setUser]=useState(null);const [users,setUsers]=useState([...USERS0]);const [notifs,setNotifs]=useState([...NOTIFS0]);
  const [done,setDone]=useState({});const [workouts,setWorkouts]=useState(JSON.parse(JSON.stringify(WK)));
  useEffect(()=>{try{const s=localStorage.getItem('iron_gym');if(s)setUser(JSON.parse(s));}catch{};},[]);
  const login=(email,pw)=>{const u=users.find(x=>x.email===email&&x.password===pw);if(u){setUser(u);try{localStorage.setItem('iron_gym',JSON.stringify(u));}catch{};return{success:true};}if(users.find(x=>x.email===email))return{success:false,error:'Senha incorreta'};return{success:false,error:'E-mail inválido'};};
  const logout=()=>{setUser(null);try{localStorage.removeItem('iron_gym');}catch{};};
  const markRead=(id)=>setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
  const sendNotif=(msg,target='all')=>setNotifs(p=>[{id:Date.now(),msg,read:false,date:'Agora',target},...p]);
  const deleteNotif=(id)=>setNotifs(p=>p.filter(n=>n.id!==id));
  const toggleEx=(day,id)=>setDone(p=>({...p,[`${day}_${id}`]:!p[`${day}_${id}`]}));
  const isDone=(day,id)=>!!done[`${day}_${id}`];
  const addUser=(u)=>setUsers(p=>[...p,{...u,id:Date.now()}]);
  const updateUser=(id,data)=>{setUsers(p=>p.map(u=>u.id===id?{...u,...data}:u));if(user&&user.id===id){const u2={...user,...data};setUser(u2);try{localStorage.setItem('iron_gym',JSON.stringify(u2));}catch{};}};
  const deleteUser=(id)=>setUsers(p=>p.filter(u=>u.id!==id));
  return(<Ctx.Provider value={{user,users,notifs,done,workouts,login,logout,markRead,sendNotif,deleteNotif,toggleEx,isDone,addUser,updateUser,deleteUser,setWorkouts}}>
    <div style={{fontFamily:"'DM Sans',-apple-system,sans-serif",background:C.bg,color:C.w,minHeight:'100vh'}}>
      {!user?<Login/>:user.type==='aluno'?<StudentApp/>:user.type==='personal'?<PersonalApp/>:<AdminApp/>}
    </div>
  </Ctx.Provider>);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>

// ── PREMIUM ACHIEVEMENT CANVAS ─────────────────────────────────────────────
// ── ANIMATED ACHIEVEMENT VIDEO RECORDER ───────────────────────────────────
function drawAchFrame(ctx, ach, streak, t, W, H) {
  const r = RARITY[ach.rarity] || RARITY.comum;
  ctx.clearRect(0,0,W,H);

  // BG
  ctx.fillStyle='#04041a'; ctx.fillRect(0,0,W,H);

  // nebula blobs
  [[W*.18,H*.18,420,'rgba(124,58,237,.2)'],[W*.82,H*.25,360,'rgba(59,130,246,.15)'],[W*.5,H*.78,320,'rgba(168,85,247,.12)']].forEach(([x,y,rad,c])=>{
    const g=ctx.createRadialGradient(x,y,0,x,y,rad);
    g.addColorStop(0,c); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });

  // twinkling stars
  const rng=(seed)=>{let s=seed;return()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646;};};
  const rand=rng(42);
  for(let i=0;i<160;i++){
    const x=rand()*W, y=rand()*H, sz=rand()*1.5+.3;
    const twinkle=0.3+0.7*Math.abs(Math.sin(t*1.5+i*0.7));
    ctx.fillStyle=`rgba(255,255,255,${twinkle*(rand()*.6+.2)})`;
    ctx.beginPath(); ctx.arc(x,y,sz,0,Math.PI*2); ctx.fill();
  }

  // card
  const cx=50,cy=50,cw=W-100,ch=H-100,cr=44;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(cx,cy,cw,ch,cr); ctx.clip();
  const bg=ctx.createLinearGradient(cx,cy,cx+cw,cy+ch);
  bg.addColorStop(0,'#080822'); bg.addColorStop(.5,'#0d0d35'); bg.addColorStop(1,'#080822');
  ctx.fillStyle=bg; ctx.fillRect(cx,cy,cw,ch);
  ctx.restore();

  // pulsing border glow
  const pulse=0.6+0.4*Math.sin(t*2.5);
  ctx.save();
  ctx.strokeStyle=r.color; ctx.lineWidth=3+pulse*2;
  ctx.shadowColor=r.color; ctx.shadowBlur=20+pulse*30;
  ctx.beginPath(); ctx.roundRect(cx,cy,cw,ch,cr); ctx.stroke();
  ctx.restore();

  // shine sweep
  const sweepX=(((t*0.18)%1.4)-0.2)*W;
  ctx.save();
  ctx.beginPath(); ctx.roundRect(cx,cy,cw,ch,cr); ctx.clip();
  const sg=ctx.createLinearGradient(sweepX-80,0,sweepX+80,0);
  sg.addColorStop(0,'rgba(255,255,255,0)'); sg.addColorStop(.5,'rgba(255,255,255,.07)'); sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg; ctx.fillRect(cx,cy,cw,ch);
  ctx.restore();

  // rarity badge
  ctx.save(); ctx.textAlign='center';
  const stars='★'.repeat(r.stars)+'☆'.repeat(5-r.stars);
  ctx.font='bold 24px Arial'; ctx.fillStyle=r.color;
  ctx.shadowColor=r.color; ctx.shadowBlur=8+pulse*6;
  ctx.fillText(`${stars}  ${r.name.toUpperCase()}  ${stars}`, W/2, cy+90);
  ctx.restore();

  // floating icon
  const floatY=Math.sin(t*1.8)*14;
  const iconY=H*.42+floatY;
  const iconGlow=ctx.createRadialGradient(W/2,iconY,0,W/2,iconY,200);
  const glowA=(0.4+0.4*Math.sin(t*2.5)).toFixed(2);
  iconGlow.addColorStop(0,r.glow.replace(/[\d.]+\)$/,glowA+')')); iconGlow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=iconGlow; ctx.fillRect(0,iconY-200,W,400);

  ctx.save();
  ctx.shadowColor=r.color; ctx.shadowBlur=30+pulse*25;
  ctx.font=`${H*.17}px serif`; ctx.textAlign='center';
  ctx.fillText(ach.icon, W/2, iconY+H*.06);
  ctx.restore();

  // divider
  const dy=H*.58;
  const dl=ctx.createLinearGradient(100,dy,W-100,dy);
  dl.addColorStop(0,'rgba(255,255,255,0)'); dl.addColorStop(.5,r.color+'99'); dl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.strokeStyle=dl; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(100,dy); ctx.lineTo(W-100,dy); ctx.stroke();

  // title
  ctx.save();
  const tg=ctx.createLinearGradient(0,H*.61,W,H*.67);
  tg.addColorStop(0,r.color); tg.addColorStop(.5,'#ffffff'); tg.addColorStop(1,r.color);
  ctx.fillStyle=tg; ctx.textAlign='center';
  ctx.shadowColor=r.color; ctx.shadowBlur=16+pulse*10;
  ctx.font=`bold ${H*.072}px Arial`;
  ctx.fillText(ach.title.toUpperCase(), W/2, H*.65);
  ctx.restore();

  // desc wrap
  ctx.save();
  ctx.font=`${H*.026}px Arial`; ctx.fillStyle='rgba(255,255,255,.6)'; ctx.textAlign='center';
  const words=ach.desc.split(' '); let line=''; const lines=[]; const maxW2=cw-140;
  for(const w2 of words){const test=line+w2+' ';if(ctx.measureText(test).width>maxW2&&line){lines.push(line.trim());line=w2+' ';}else line=test;}
  lines.push(line.trim());
  lines.forEach((l,i)=>ctx.fillText(l,W/2,H*.70+i*(H*.035)));
  ctx.restore();

  // streak
  if(streak>0){
    const sY=H*.78+(lines.length>1?H*.035:0);
    ctx.save();
    ctx.font=`bold ${H*.032}px Arial`; ctx.fillStyle='#f59e0b'; ctx.textAlign='center';
    ctx.shadowColor='rgba(245,158,11,.5)'; ctx.shadowBlur=10;
    ctx.fillText(`🔥 ${streak} dias de ofensiva`, W/2, sY);
    ctx.restore();
  }

  // PULSAR logo bottom
  const logoY=H*.88;
  ctx.save();
  const pg=ctx.createLinearGradient(W/2-80,logoY,W/2+80,logoY+40);
  pg.addColorStop(0,'#a855f7'); pg.addColorStop(1,'#3b82f6');
  ctx.fillStyle=pg; ctx.textAlign='center';
  ctx.font=`bold ${H*.038}px Arial`;
  ctx.shadowColor='rgba(168,85,247,.5)'; ctx.shadowBlur=14;
  ctx.fillText('PULSAR', W/2, logoY+H*.03);
  ctx.font=`${H*.016}px Arial`; ctx.fillStyle='rgba(255,255,255,.25)'; ctx.shadowBlur=0;
  ctx.fillText('TREINE · EVOLUA · CONQUISTE', W/2, logoY+H*.06);
  ctx.restore();
}

async function shareAch(ach, profile, streak) {
  const W=1080, H=1350, FPS=30, DURATION=3;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  // Try to record as video
  const supported = typeof MediaRecorder !== 'undefined' &&
    (MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ||
     MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ||
     MediaRecorder.isTypeSupported('video/webm'));

  if(supported){
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
      ? 'video/webm;codecs=vp9'
      : MediaRecorder.isTypeSupported('video/webm;codecs=vp8')
      ? 'video/webm;codecs=vp8'
      : 'video/webm';

    const stream = canvas.captureStream(FPS);
    const recorder = new MediaRecorder(stream, {mimeType, videoBitsPerSecond:8000000});
    const chunks = [];
    recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };

    return new Promise(resolve => {
      recorder.onstop = async () => {
        const blob = new Blob(chunks, {type: mimeType});
        const ext = 'webm';
        const file = new File([blob], `pulsar-conquista.${ext}`, {type: mimeType});
        try {
          if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({title:'Pulsar',text:`Conquistei "${ach.title}" no Pulsar! 🚀`,files:[file]});
          } else {
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a'); a.href=url; a.download=`pulsar-conquista.${ext}`; a.click();
            setTimeout(()=>URL.revokeObjectURL(url),5000);
          }
        } catch(e) {
          // fallback to PNG
          drawAchFrame(ctx,ach,streak,0,W,H);
          const dataUrl=canvas.toDataURL('image/png');
          const a=document.createElement('a'); a.href=dataUrl; a.download='pulsar-conquista.png'; a.click();
        }
        resolve();
      };

      recorder.start();
      let startTime=null;
      function frame(ts){
        if(!startTime) startTime=ts;
        const t=(ts-startTime)/1000;
        drawAchFrame(ctx,ach,streak,t,W,H);
        if(t<DURATION) requestAnimationFrame(frame);
        else recorder.stop();
      }
      requestAnimationFrame(frame);
    });
  } else {
    // Fallback: static PNG
    drawAchFrame(ctx,ach,streak,0,W,H);
    const dataUrl=canvas.toDataURL('image/png');
    try{
      const blob=await(await fetch(dataUrl)).blob();
      const file=new File([blob],'pulsar-conquista.png',{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({title:'Pulsar',text:`Conquistei "${ach.title}" no Pulsar! 🚀`,files:[file]});
        return;
      }
    }catch(e){}
    const a=document.createElement('a'); a.href=dataUrl; a.download='pulsar-conquista.png'; a.click();
  }
}


// ── OVERLAY SYSTEM ─────────────────────────────────────────────────────────
// Minimal white transparent PNG — Strava-style, left-aligned, no effects

function t(ctx, text, x, y, font, alpha=1, align='left') {
  ctx.save();
  ctx.font=font; ctx.fillStyle=`rgba(255,255,255,${alpha})`;
  ctx.textAlign=align;
  // subtle dark shadow for legibility on any background
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=6; ctx.shadowOffsetX=0; ctx.shadowOffsetY=1;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function divider(ctx, x, y, w) {
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=1.5;
  ctx.shadowColor='rgba(0,0,0,.4)'; ctx.shadowBlur=3;
  ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+w,y); ctx.stroke();
  ctx.restore();
}

// 1. CONQUISTA
function genOverlayConquista(ach, streak) {
  const W=1080,H=1920;
  const canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const x=W*.08, fs=W*.042;
  let y=H*.34;

  // icon
  ctx.save(); ctx.font=`${W*.09}px serif`; ctx.fillStyle='rgba(255,255,255,1)';
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=6;
  ctx.fillText(ach.icon, x, y); ctx.restore();
  y += W*.07;

  // label
  t(ctx,'CONQUISTA', x, y, `${W*.026}px Arial`, .7);
  y += W*.066;

  // name
  t(ctx, ach.title.toUpperCase(), x, y, `bold ${W*.092}px Arial`, 1);
  y += W*.04;

  // divider
  divider(ctx, x, y, W*.22);
  y += W*.06;

  // streak
  if(streak>0){
    t(ctx, `🔥 ${streak} ${streak===1?'dia':'dias'} de ofensiva`, x, y, `${W*.038}px Arial`, .9);
    y += W*.055;
  }

  // PULSAR
  t(ctx, '⚡ PULSAR', x, y, `bold ${W*.03}px Arial`, .7);

  return canvas;
}

// 2. TREINO CONCLUÍDO
function genOverlayTreino(day, focus, exCount, streak) {
  const W=1080,H=1920;
  const canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const x=W*.08;
  let y=H*.34;

  ctx.save(); ctx.font=`${W*.09}px serif`; ctx.fillStyle='rgba(255,255,255,1)';
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=6;
  ctx.fillText('💪', x, y); ctx.restore();
  y += W*.07;

  t(ctx,'TREINO',x,y,`${W*.026}px Arial`,.7);
  y += W*.066;

  t(ctx,focus.toUpperCase(),x,y,`bold ${W*.085}px Arial`,1);
  y += W*.04;

  divider(ctx,x,y,W*.22);
  y += W*.06;

  t(ctx,`${exCount} exercícios · ${day}`,x,y,`${W*.034}px Arial`,.85);

  if(streak>0){
    t(ctx,`🔥 ${streak} ${streak===1?'dia':'dias'} de ofensiva`,x,y,`${W*.034}px Arial`,.85);
    y += W*.05;
  }

  t(ctx,'⚡ PULSAR',x,y,`bold ${W*.03}px Arial`,.7);

}

// 3. OFENSIVA
function genOverlayStreak(streak, longest) {
  const W=1080,H=1920;
  const canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const x=W*.08;
  let y=H*.52;

  ctx.save(); ctx.font=`${W*.09}px serif`; ctx.fillStyle='rgba(255,255,255,1)';
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=6;
  ctx.fillText('🔥', x, y); ctx.restore();
  y += W*.07;

  t(ctx,'OFENSIVA',x,y,`${W*.026}px Arial`,.7);
  y += W*.066;

  t(ctx,`${streak}`,x,y,`bold ${W*.18}px Arial`,1);
  y += W*.04;

  divider(ctx,x,y,W*.22);
  y += W*.06;

  t(ctx,'DIAS CONSECUTIVOS',x,y,`${W*.034}px Arial`,.85);
  y += W*.05;

  if(longest>streak&&longest>0){
    t(ctx,`Melhor: ${longest} dias`,x,y,`${W*.028}px Arial`,.6);
    y += W*.05;
  }

  t(ctx,'⚡ PULSAR',x,y,`bold ${W*.03}px Arial`,.7);
  return canvas;
}

// 4. RECORDE
function genOverlayRecorde(exName, weight) {
  const W=1080,H=1920;
  const canvas=document.createElement('canvas'); canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const x=W*.08;
  let y=H*.34;

  ctx.save(); ctx.font=`${W*.09}px serif`; ctx.fillStyle='rgba(255,255,255,1)';
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=6;
  ctx.fillText('🏋️', x, y); ctx.restore();
  y += W*.07;

  t(ctx,'RECORDE PESSOAL',x,y,`${W*.026}px Arial`,.7);
  y += W*.066;

  // wrap exercise name
  ctx.save(); ctx.font=`bold ${W*.072}px Arial`; ctx.fillStyle='rgba(255,255,255,1)';
  ctx.shadowColor='rgba(0,0,0,.55)'; ctx.shadowBlur=6;
  const words=exName.split(' '); let line=''; const lines=[];
  for(const w2 of words){const test=line+w2+' ';if(ctx.measureText(test).width>W*.56&&line){lines.push(line.trim());line=w2+' ';}else line=test;}
  lines.push(line.trim());
  lines.forEach((l,i)=>ctx.fillText(l,x,y+i*(W*.08)));
  ctx.restore();
  y += lines.length*W*.08;

  divider(ctx,x,y,W*.22);
  y += W*.06;

  t(ctx,`${weight} kg`,x,y,`bold ${W*.092}px Arial`,1);
  y += W*.04+W*.092;

  t(ctx,'⚡ PULSAR',x,y,`bold ${W*.03}px Arial`,.7);
  return canvas;
}

// ── DOWNLOAD / SHARE PNG ───────────────────────────────────────────────────
async function downloadOverlay(canvas, filename) {
  const dataUrl = canvas.toDataURL('image/png');
  try {
    const blob = await(await fetch(dataUrl)).blob();
    const file = new File([blob], filename+'.png', {type:'image/png'});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({title:'Pulsar',files:[file]});
      return;
    }
  } catch(e){}
  const a=document.createElement('a'); a.href=dataUrl; a.download=filename+'.png'; a.click();
}

// ── OVERLAY MODAL ──────────────────────────────────────────────────────────
function OverlayModal({type, data, onClose}) {
  const [preview, setPreview] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(()=>{
    let canvas;
    if(type==='conquista') canvas=genOverlayConquista(data.ach, data.streak||0);
    else if(type==='treino') canvas=genOverlayTreino(data.day, data.focus, data.exCount, data.streak||0);
    else if(type==='streak') canvas=genOverlayStreak(data.streak, data.longest||0);
    else if(type==='recorde') canvas=genOverlayRecorde(data.name, data.weight);
    if(canvas) setPreview(canvas.toDataURL('image/png'));
  },[]);

  const save = async () => {
    setSaving(true);
    let canvas, filename;
    if(type==='conquista'){canvas=genOverlayConquista(data.ach,data.streak||0);filename=`pulsar-${data.ach.id}`;}
    else if(type==='treino'){canvas=genOverlayTreino(data.day,data.focus,data.exCount,data.streak||0);filename='pulsar-treino';}
    else if(type==='streak'){canvas=genOverlayStreak(data.streak,data.longest||0);filename=`pulsar-${data.streak}dias`;}
    else if(type==='recorde'){canvas=genOverlayRecorde(data.name,data.weight);filename='pulsar-recorde';}
    await downloadOverlay(canvas, filename);
    setSaving(false);
    onClose();
  };

  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.95)',zIndex:4000,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:360,display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
        <div style={{fontSize:11,color:C.g2,letterSpacing:2}}>PRÉVIA DO OVERLAY</div>
        {/* Preview on fake photo bg */}
        <div style={{width:'100%',aspectRatio:'9/16',borderRadius:20,overflow:'hidden',position:'relative',background:'linear-gradient(135deg,#8b8b8b 25%,#6b6b6b 25%,#6b6b6b 50%,#8b8b8b 50%,#8b8b8b 75%,#6b6b6b 75%)',backgroundSize:'20px 20px',border:`1px solid ${C.bd}`}}>
          {/* fake photo texture */}
          <div style={{position:'absolute',inset:0,background:'radial-gradient(ellipse at 30% 40%,rgba(255,255,255,.06),transparent 60%)'}}/>
          {preview&&<img src={preview} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain'}}/>}
        </div>
        <div style={{fontSize:11,color:C.g2,textAlign:'center',lineHeight:1.6}}>
          Salve e aplique sobre sua foto no Instagram:<br/>
          <span style={{color:C.acc}}>Nova história → Foto → Sticker → Imagem → Selecionar</span>
        </div>
        <button onClick={save} disabled={saving} style={{...bR({width:'100%'}),opacity:saving?.7:1}}>
          {saving?'Salvando...':'💾 Salvar e Compartilhar'}
        </button>
        <button onClick={onClose} style={bO({width:'100%',padding:'10px',fontSize:13})}>Fechar</button>
      </div>
    </div>
  );
}

// ── PREMIUM ACHIEVEMENT CARD ───────────────────────────────────────────────
function AchievCard({a, unlocked, onShare}){

  return(
    <div onClick={()=>unlocked&&onShare(a)} style={{
      position:'relative',overflow:'hidden',flexShrink:0,width:100,
      background:unlocked?`linear-gradient(145deg,#080820,#13133a)`:C.card2,
      borderRadius:14,padding:'14px 8px',textAlign:'center',
      border:`1px solid ${unlocked?r.color:C.bd}`,
      opacity:unlocked?1:.35,cursor:unlocked?'pointer':'default',
      transition:'transform .15s,box-shadow .15s',
      boxShadow:unlocked?`0 0 18px ${r.glow}`:'none',
    }}
    onMouseEnter={e=>{if(unlocked){e.currentTarget.style.transform='scale(1.05)';e.currentTarget.style.boxShadow=`0 0 30px ${r.glow}`;}}}
    onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=unlocked?`0 0 20px ${r.glow}`:'none';}}>

// ── REST TIMER ─────────────────────────────────────────────────────────────
function RestTimer({initSecs=60,onClose}){
  const [secs,setSecs]=useState(initSecs);const [left,setLeft]=useState(initSecs);const [run,setRun]=useState(true);const QUICK=[30,60,90,120];
  useEffect(()=>{if(!run||left<=0)return;const t=setTimeout(()=>setLeft(p=>p-1),1000);return()=>clearTimeout(t);},[left,run]);
  useEffect(()=>{if(left===0&&'vibrate'in navigator)navigator.vibrate([300,100,300,100,300]);},[left]);
  const pct=Math.max(0,(secs-left)/secs*100);const done=left<=0;
  const fmt=s=>`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  const r2=65,circ=2*Math.PI*r2;
  const setTime=(s)=>{setSecs(s);setLeft(s);setRun(true);};
  return(<div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.93)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2000,padding:24}}>
    <div onClick={e=>e.stopPropagation()} style={{...mkCard({padding:28}),maxWidth:300,width:'100%',textAlign:'center'}}>
      <div style={{fontSize:11,color:C.g2,marginBottom:12,letterSpacing:1}}>TEMPO DE DESCANSO</div>
      <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:20}}>
        {QUICK.map(s=><button key={s} onClick={()=>setTime(s)} style={{background:secs===s?C.pri:C.card2,border:`1px solid ${secs===s?C.pri:C.bd}`,borderRadius:20,padding:'5px 12px',color:secs===s?'#fff':C.g1,fontSize:12,fontWeight:700,cursor:'pointer'}}>{s}s</button>)}
      </div>
      <div style={{position:'relative',width:150,height:150,margin:'0 auto 20px'}}>
        <svg width="150" height="150" style={{transform:'rotate(-90deg)'}}>
          <circle cx="75" cy="75" r={r2} fill="none" stroke="#1a1a1a" strokeWidth="8"/>
          <circle cx="75" cy="75" r={r2} fill="none" stroke={done?C.grn:C.pri} strokeWidth="8" strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} style={{transition:'stroke-dashoffset .9s'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
          <div style={{...hf,fontSize:36,color:done?C.grn:C.w}}>{done?'✓':fmt(left)}</div>
          {done&&<div style={{fontSize:12,color:C.grn,marginTop:2}}>Pronto! 💪</div>}
        </div>
      </div>
      <div style={{display:'flex',gap:10}}>
        {!done&&<button onClick={()=>setRun(p=>!p)} style={{...bO({flex:1,padding:'10px',fontSize:13})}}>{run?'⏸':'▶'}</button>}
        <button onClick={()=>setTime(secs)} style={{...bO({flex:1,padding:'10px',fontSize:13})}}>↺</button>
        <button onClick={onClose} style={{...bR({flex:1,padding:'10px',fontSize:13,background:done?C.grn:C.pri})}}>Fechar</button>
      </div>
    </div>
  </div>);
}

// ── HOME ───────────────────────────────────────────────────────────────────
function HomeScreen({user,profile,workouts,done,setTab}){
  const tw=TODAY?workouts[TODAY]:null;const doneCt=tw?tw.exercises.filter(e=>done[`${TODAY}_${e.id}`]).length:0;const pct=tw&&tw.exercises.length>0?Math.round(doneCt/tw.exercises.length*100):0;
  const motd={1:{icon:'🌟',t:'Nova semana!',s:'Consistência é o que separa os campeões.'},5:{icon:'🔥',t:'Chegou até sexta!',s:'Mais uma semana vencida.'},6:{icon:'💪',t:'Sábado é para os fortes!',s:'Enquanto todos descansam, você evolui.'},0:{icon:'🏖️',t:'Domingo!',s:'Recarregue para a semana.'}}[new Date().getDay()];
  const [motDis,setMotDis]=useState(false);
  const dateStr=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
  const streak=profile?.streak||0;
  return(<div style={{padding:'16px 16px 80px'}} className="slide-up">
    <div style={{marginBottom:18}}>
      <div style={{fontSize:13,color:C.g2}}>Olá de volta,</div>
      <div style={{...hf,fontSize:28}}>{(profile?.name||user.name||'Atleta').split(' ')[0].toUpperCase()} 👋</div>
      <div style={{fontSize:12,color:C.g2,marginTop:2}}>{dateStr.charAt(0).toUpperCase()+dateStr.slice(1)}</div>
    </div>
    {motd&&!motDis&&<div style={{background:C.redA,border:`1px solid ${C.redB}`,borderRadius:10,padding:'12px 14px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
      <span style={{fontSize:22}}>{motd.icon}</span><div style={{flex:1}}><div style={{fontWeight:700,fontSize:14}}>{motd.t}</div><div style={{fontSize:12,color:C.g2}}>{motd.s}</div></div>
      <button onClick={()=>setMotDis(true)} style={{background:'none',border:'none',color:C.g2,fontSize:18,cursor:'pointer'}}>✕</button>
    </div>}
    {streak>0&&<div style={{...mkCard({padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12,borderColor:'rgba(255,152,0,.3)'})}}>
      <span style={{fontSize:28}}>🔥</span>
      <div><div style={{fontWeight:700,fontSize:15,color:C.ora}}>{streak} dias de ofensiva</div><div style={{fontSize:11,color:C.g2}}>Continue assim!</div></div>
    </div>}
    {tw&&tw.exercises.length>0?(<div style={{...mkCard({padding:18,marginBottom:14})}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
        <div><div style={{fontSize:11,color:C.g2}}>HOJE · {TODAY?.toUpperCase()}</div><div style={{...hf,fontSize:19}}>{tw.focus.toUpperCase()}</div><div style={{fontSize:12,color:C.g2}}>{tw.exercises.length} exercícios</div></div>
        <div style={{textAlign:'right'}}><div style={{...hf,fontSize:26,color:pct===100?C.grn:C.pri}}>{pct}%</div><div style={{fontSize:11,color:C.g2}}>{doneCt}/{tw.exercises.length}</div></div>
      </div>
      <div style={{background:C.card2,borderRadius:20,height:5,overflow:'hidden',marginBottom:14}}><div style={{height:'100%',width:`${pct}%`,background:pct===100?C.grn:C.pri,borderRadius:20,transition:'width .4s'}}/></div>
      <button style={bR()} onClick={()=>setTab('treinos')}>{pct===100?'✓ VER TREINO':'▶ INICIAR TREINO'}</button>
    </div>):(<div style={{...mkCard({padding:24,textAlign:'center',marginBottom:14})}}>
      <div style={{fontSize:36,marginBottom:8}}>🏖️</div><div style={{fontWeight:700,fontSize:15}}>Dia de descanso!</div>
      <button style={{...bR({marginTop:12})}} onClick={()=>setTab('planos')}>📋 Ver planos de treino</button>
    </div>)}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      {[['💪','Treinos','treinos'],['📋','Planos','planos'],['📚','Biblioteca','biblioteca'],['👤','Perfil','perfil']].map(([icon,label,id])=>(
        <div key={id} onClick={()=>setTab(id)} style={{...mkCard({padding:'16px',textAlign:'center',cursor:'pointer'})}}>
          <div style={{fontSize:26,marginBottom:4}}>{icon}</div>
          <div style={{fontSize:13,fontWeight:600,color:C.g1}}>{label}</div>
        </div>
      ))}
    </div>
  </div>);
}

// ── EXERCISE CARD ──────────────────────────────────────────────────────────
function ExCard({ex,day,isDoneVal,editMode,onToggle,onRemove,onTimer,onYt,lastLoad,onSaveLoad}){
  const [loadInput,setLoadInput]=useState('');const [showLoad,setShowLoad]=useState(false);
  return(
    <div style={{...mkCard({padding:'14px',marginBottom:8,borderColor:isDoneVal?'rgba(76,175,80,.4)':C.bd,background:isDoneVal?'rgba(76,175,80,.04)':C.card})}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        {editMode?<button onClick={onRemove} style={{width:26,height:26,borderRadius:'50%',background:'rgba(255,100,100,.15)',border:'1px solid rgba(255,100,100,.3)',color:'#ff6b6b',fontSize:14,fontWeight:700,cursor:'pointer',flexShrink:0}}>✕</button>
        :<button onClick={onToggle} style={{width:26,height:26,borderRadius:'50%',border:`2px solid ${isDoneVal?C.grn:C.g3}`,background:isDoneVal?C.grn:'transparent',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'all .2s'}}>{isDoneVal&&<span style={{color:'#fff',fontSize:13,fontWeight:800}}>✓</span>}</button>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,color:isDoneVal?C.g2:C.w,textDecoration:isDoneVal?'line-through':'none'}}>{ex.name}</div>
          <div style={{fontSize:12,color:C.g2,marginTop:2}}>{ex.series}× {ex.reps} · {ex.rest}</div>
          {ex.obs&&<div style={{fontSize:11,color:C.pri,marginTop:2}}>📌 {ex.obs}</div>}
          {lastLoad&&<div style={{fontSize:11,color:C.ora,marginTop:2}}>⚖️ Último: {lastLoad.weight}kg</div>}
        </div>
        <div style={{display:'flex',gap:4,flexShrink:0}}>
          <button onClick={()=>setShowLoad(p=>!p)} style={{background:C.oraA,border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:C.ora,fontSize:11}}>⚖️</button>
          <button onClick={onTimer} style={{background:C.bluA,border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:C.blu,fontSize:11}}>⏱</button>
          <button onClick={onYt} style={{background:'rgba(255,0,0,.1)',border:'none',borderRadius:6,padding:'5px 8px',cursor:'pointer',color:'#ff4444',fontSize:11}}>▶</button>

function LibraryInline({onAdd}){

  const toggle=(ex)=>setSel(p=>p.find(e=>e.name===ex.name)?p.filter(e=>e.name!==ex.name):[...p,ex]);
  const allEx=search?Object.entries(EXLIB).flatMap(([g,exs])=>exs.map(e=>({...e,grp:g}))).filter(e=>e.name.toLowerCase().includes(search.toLowerCase())):null;
  return(<div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
    <div style={{padding:'10px 16px 6px',flexShrink:0}}>

          <div style={{width:22,height:22,borderRadius:5,border:`2px solid ${s?C.pri:C.g3}`,background:s?C.pri:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:2}}>{s&&<span style={{color:'#fff',fontSize:12,fontWeight:800}}>✓</span>}</div>

      <button style={bR()} onClick={()=>onAdd(sel)}>Adicionar {sel.length} exercício(s)</button>
    </div>}
  </div>);
}

// ── PERSONAL APP ───────────────────────────────────────────────────────────
function PersonalApp({user,onLogout}){
  const [tab,setTab]=useState('alunos');const [students,setStudents]=useState([]);const [selStudent,setSelStudent]=useState(null);const [notifs,setNotifs]=useState([]);const [showNotifCenter,setShowNotifCenter]=useState(false);const [msg,setMsg]=useState('');const [search,setSearch]=useState('');const [addModal,setAddModal]=useState(false);const [newEmail,setNewEmail]=useState('');const [err2,setErr2]=useState('');const [linking,setLinking]=useState(false);

  useEffect(()=>{return db.collection('publicUsers').where('personalId','==',user.uid).onSnapshot(snap=>setStudents(snap.docs.map(d=>d.data())));},[user.uid]);
  useEffect(()=>{return db.collection('notifications').where('to','==',user.uid).onSnapshot(snap=>setNotifs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));},[user.uid]);

  // FIX: busca por email sem validar role (vincula qualquer usuário)
  const linkStudent=async()=>{
    setErr2('');setLinking(true);
    try{
      const q=await db.collection('publicUsers').where('email','==',newEmail.trim().toLowerCase()).get();
      if(q.empty){setErr2('Usuário não encontrado. Verifique o e-mail.');setLinking(false);return;}
      const doc=q.docs[0];const d=doc.data();
      // aceita aluno ou usuário sem role definida
      if(d.role&&d.role!=='aluno'){setErr2(`Este usuário tem perfil "${d.role}" e não pode ser vinculado como aluno.`);setLinking(false);return;}
      if(d.personalId&&d.personalId!==user.uid){setErr2('Este aluno já está vinculado a outro personal.');setLinking(false);return;}
      await db.collection('publicUsers').doc(doc.id).update({personalId:user.uid,personalName:user.name,role:'aluno'});
      setNewEmail('');setAddModal(false);alert(`✓ ${d.name} vinculado com sucesso!`);
    }catch(e){setErr2('Erro ao vincular: '+e.message);}
    setLinking(false);
  };

  const sendNotifAll=async()=>{if(!msg.trim())return;try{const snap=await db.collection('publicUsers').where('personalId','==',user.uid).get();const batch=db.batch();snap.docs.forEach(doc=>{const s=doc.data();const ref=db.collection('notifications').doc();batch.set(ref,{to:doc.id,from:user.uid,fromName:user.name,msg:msg.trim(),read:false,createdAt:Date.now()});});await batch.commit();setMsg('');alert('✓ Enviado para '+snap.docs.length+' aluno(s)!');}catch(e){alert('Erro: '+e.message);}};

  const unread=notifs.filter(n=>!n.read).length;
  const TABS=[['alunos','👥','Alunos'],['avisos','📢','Avisos']];

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    {showNotifCenter&&<NotifCenter
      notifs={notifs}
      onClose={()=>setShowNotifCenter(false)}
      onMarkRead={(id)=>db.collection('notifications').doc(id).update({read:true})}
      onMarkAll={()=>{const batch=db.batch();notifs.filter(n=>!n.read).forEach(n=>batch.update(db.collection('notifications').doc(n.id),{read:true}));batch.commit();}}
      onDelete={(id)=>db.collection('notifications').doc(id).delete()}
    />}
    {addModal&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.9)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:24}}>
      <div style={{...mkCard({padding:24}),width:'100%',maxWidth:360}}>
        <div style={{...hf,fontSize:18,marginBottom:4}}>Adicionar Aluno</div>
        <div style={{fontSize:12,color:C.g2,marginBottom:16}}>O aluno precisa ter conta criada no aplicativo.</div>
        <label style={lbl}>E-MAIL DO ALUNO</label>

// ── ADMIN APP ──────────────────────────────────────────────────────────────
function AdminApp({user,onLogout}){
  const [tab,setTab]=useState('users');const [users,setUsers]=useState([]);const [filt,setFilt]=useState('all');const [msg,setMsg]=useState('');const [to,setTo]=useState('all');const [notifs,setNotifs]=useState([]);const [showNotifCenter,setShowNotifCenter]=useState(false);
  useEffect(()=>{return db.collection('publicUsers').onSnapshot(snap=>setUsers(snap.docs.map(d=>d.data())));},[]);
  useEffect(()=>{return db.collection('notifications').where('to','==',user.uid).onSnapshot(snap=>setNotifs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));},[user.uid]);
  const shown=users.filter(u=>filt==='all'||u.role===filt);
  const updateRole=async(uid,role)=>{await db.collection('publicUsers').doc(uid).update({role});};
  const sendNotif=async()=>{
    if(!msg.trim())return;
    try{
      const snap=await db.collection('publicUsers').get();
      const batch=db.batch();
      let count=0;
      snap.docs.forEach(doc=>{
        const u=doc.data();
        const role=u.role||'aluno';
        if(to==='all'||(to==='aluno'&&(role==='aluno'||!u.role))||(to===role)){
          const ref=db.collection('notifications').doc();
          batch.set(ref,{to:doc.id,from:user.uid,fromName:'Admin Pulsar',msg:msg.trim(),read:false,createdAt:Date.now()});
          count++;
        }
      });
      await batch.commit();setMsg('');alert(`✓ Enviado para ${count} usuário(s)!`);
    }catch(e){alert('Erro: '+e.message);}
  };
  const TABS=[['users','👥','Usuários'],['notif','📢','Avisos'],['dash','📊','Dashboard']];
  const alunos=users.filter(u=>u.role==='aluno'||!u.role);const personals=users.filter(u=>u.role==='personal');const admins=users.filter(u=>u.role==='admin');
  const unread=notifs.filter(n=>!n.read).length;

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    {showNotifCenter&&<NotifCenter
      notifs={notifs}
      onClose={()=>setShowNotifCenter(false)}
      onMarkRead={(id)=>db.collection('notifications').doc(id).update({read:true})}
      onMarkAll={()=>{const batch=db.batch();notifs.filter(n=>!n.read).forEach(n=>batch.update(db.collection('notifications').doc(n.id),{read:true}));batch.commit();}}
      onDelete={(id)=>db.collection('notifications').doc(id).delete()}

// ── ALUNO APP ──────────────────────────────────────────────────────────────
function AlunoApp({user,onLogout}){
  const [profile,setProfile]=useState(null);const [workouts,setWK]=useState(DEFAULT_WK);const [done,setDone]=useState({});const [loads,setLoads]=useState({});const [tab,setTab]=useState('home');const [notifs,setNotifs]=useState([]);const [showNotifCenter,setShowNotifCenter]=useState(false);
  useEffect(()=>{return db.collection('publicUsers').doc(user.uid).onSnapshot(snap=>{if(snap.exists)setProfile(snap.data());});},[user.uid]);
  useEffect(()=>{
    const unsubWk=db.collection('studentWorkouts').doc(user.uid).onSnapshot(doc=>{if(doc.exists&&doc.data().workouts)setWK(doc.data().workouts);else db.collection('publicWorkouts').doc(user.uid).onSnapshot(d=>{if(d.exists&&d.data().workouts)setWK(d.data().workouts);});});
    return unsubWk;
  },[user.uid]);
  useEffect(()=>{return db.collection('publicDone').doc(user.uid).onSnapshot(snap=>{if(snap.exists){const d=snap.data();const cw=getWeekKey();if(d.week&&d.week!==cw){db.collection('publicDone').doc(user.uid).set({done:{},week:cw});setDone({});}else setDone(d.done||{});}});},[user.uid]);
  useEffect(()=>{return db.collection('publicLoads').doc(user.uid).onSnapshot(snap=>{if(snap.exists)setLoads(snap.data().loads||{});});},[user.uid]);
  useEffect(()=>{
    return db.collection('notifications').where('to','==',user.uid).onSnapshot(snap=>setNotifs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))));
  },[user.uid]);

  const updateStreak=async()=>{try{const ref=db.collection('publicUsers').doc(user.uid);const snap=await ref.get();if(!snap.exists)return;const d=snap.data();const t=todayStr();if(d.lastWorkoutDate===t)return;const ns=d.lastWorkoutDate===yesterdayStr()?(d.streak||0)+1:1;const dates=[...(d.workoutDates||[]).slice(-89),t];await ref.update({streak:ns,longestStreak:Math.max(ns,d.longestStreak||0),lastWorkoutDate:t,treinos:(d.treinos||0)+1,workoutDates:dates});}catch(e){}};
  const toggleEx=(day,id)=>{const key=`${day}_${id}`;const nd={...done,[key]:!done[key]};setDone(nd);db.collection('publicDone').doc(user.uid).set({done:nd,week:getWeekKey()});const w=workouts[day];if(w&&w.exercises.length>0){const ct=w.exercises.filter(e=>{const k=`${day}_${e.id}`;return k===key?!done[key]:!!nd[k];}).length;if(ct===w.exercises.length)updateStreak();}};
  const updateWK=(nw)=>{setWK(nw);db.collection('publicWorkouts').doc(user.uid).set({workouts:nw});};
  const updateProfile=async(data)=>await db.collection('publicUsers').doc(user.uid).set(data,{merge:true});
  const saveLoad=async(exId,exName,weight)=>{const nl={...loads,[exName]:{weight,date:new Date().toLocaleDateString('pt-BR')}};setLoads(nl);await db.collection('publicLoads').doc(user.uid).set({loads:nl});};

  const unread=notifs.filter(n=>!n.read).length;
  const TABS=[['home','🏠','Home'],['treinos','💪','Treinos'],['planos','📋','Planos'],['biblioteca','📚','Biblioteca'],['perfil','👤','Perfil']];

  return(<div style={{minHeight:'100vh',background:C.bg}}>
    {showNotifCenter&&<NotifCenter
      notifs={notifs}
      onClose={()=>setShowNotifCenter(false)}
      onMarkRead={(id)=>db.collection('notifications').doc(id).update({read:true})}
      onMarkAll={()=>{const batch=db.batch();notifs.filter(n=>!n.read).forEach(n=>batch.update(db.collection('notifications').doc(n.id),{read:true}));batch.commit();}}
      onDelete={(id)=>db.collection('notifications').doc(id).delete()}
    />}
    {/* Top bar with bell */}
